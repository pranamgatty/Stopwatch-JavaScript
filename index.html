<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stopwatch</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Stopwatch</h1>
    <div class="timer-card">
      <div id="timeDisplay" class="time-display">00:00:00.000</div>
      <div class="controls">
        <button id="startPauseBtn" class="btn btn-start">Start</button>
        <button id="lapBtn" class="btn btn-lap" disabled>Lap</button>
        <button id="resetBtn" class="btn btn-reset" disabled>Reset</button>
      </div>
    </div>
    <section class="laps-section">
      <h2>Laps</h2>
      <ul id="lapsList" class="laps-list"></ul>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
